<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Street Racer 3D - Zaplay Games</title>
  <link rel="stylesheet" href="../../shared/game-base.css">
  <link rel="stylesheet" href="../../shared/game-3d.css">
</head>
<body class="game-shell-3d">
  <div class="top-bar">
    <a class="btn" href="../../index.html">Back to Zaplay Games</a>
    <button data-mode="race" class="primary active">Street Race</button>
    <button data-mode="trial">Time Attack</button>
  </div>
  <div id="game-container">
    <div class="hud-3d">
      <div class="row">
        <div id="hud-status">Reach the finish - avoid traffic!</div>
        <div id="hud-distance">0 m / 3000 m</div>
      </div>
      <div class="race-progress"><div id="race-progress-fill"></div></div>
    </div>
    <div class="speed-panel">
      <span class="val" id="speed-val">0</span>
      <span class="unit">KM/H</span>
      <span class="nitro" id="nitro-val">NITRO 100%</span>
    </div>
    <div class="start-overlay" id="start-overlay">
      <h2>Street Racer 3D</h2>
      <p>Dodge traffic, hit nitro, and reach the finish line as fast as you can.</p>
      <button id="play-btn">START RACE</button>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
